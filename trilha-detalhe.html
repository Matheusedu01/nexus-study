<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe da Trilha - Nexus Study</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/utils.js"></script>
    <style>
        .back-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .trilha-header-detalhe {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .trilha-header-detalhe .titulo {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .trilha-header-detalhe .descricao {
            color: rgba(255, 255, 255, 0.62);
            font-size: 16px;
        }

        .trilha-header-detalhe .meta {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
            color: rgba(255, 255, 255, 0.59);
            font-size: 14px;
        }

        .trilha-header-detalhe .meta strong {
            color: #fff;
        }

        /* Abas */
        .abas-container {
            margin-bottom: 25px;
        }

        .abas {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .aba {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.62);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        .aba:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .aba.active {
            color: #3a86ff;
            background: rgba(58, 134, 255, 0.1);
        }

        .aba .badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }

        .aba.active .badge {
            background: rgba(58, 134, 255, 0.2);
        }

        .aba .badge.concluido {
            background: rgba(0, 245, 212, 0.15);
            color: #00f5d4;
        }

        /* Lista de estudos */
        .lista-estudos {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .estudo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .estudo-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .estudo-item .info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .estudo-item .info .ordem {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.59);
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .estudo-item .info .titulo {
            color: #fff;
            font-weight: 500;
        }

        .estudo-item .info .modulo {
            color: rgba(255, 255, 255, 0.59);
            font-size: 13px;
        }

        .estudo-item .status {
            font-size: 12px;
            padding: 4px 14px;
            border-radius: 12px;
            font-weight: 600;
        }

        .status-concluido {
            background: rgba(0, 245, 212, 0.15);
            color: #00f5d4;
        }

        .status-pendente {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.59);
        }

        .status-atual {
            background: rgba(58, 134, 255, 0.15);
            color: #3a86ff;
            border: 1px solid rgba(58, 134, 255, 0.2);
        }

        .btn-estudar {
            padding: 6px 20px;
            background: linear-gradient(135deg, #3a86ff, #8338ec);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn-estudar:hover {
            transform: scale(1.05);
        }

        .btn-estudar.concluido {
            background: rgba(0, 245, 212, 0.1);
            color: #00f5d4;
            cursor: default;
        }

        /* Tema Claro */
        body.light-theme .trilha-header-detalhe .titulo {
            color: #1a1a2e;
        }

        body.light-theme .trilha-header-detalhe .descricao {
            color: #555;
        }

        body.light-theme .trilha-header-detalhe .meta {
            color: #999;
        }

        body.light-theme .trilha-header-detalhe .meta strong {
            color: #1a1a2e;
        }

        body.light-theme .aba {
            color: rgba(0, 0, 0, 0.63);
        }

        body.light-theme .aba:hover {
            color: #1a1a2e;
        }

        body.light-theme .aba.active {
            color: #3a86ff;
            background: rgba(58, 134, 255, 0.1);
        }

        body.light-theme .estudo-item {
            background: rgba(0, 0, 0, 0.02);
        }

        body.light-theme .estudo-item:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        body.light-theme .estudo-item .info .titulo {
            color: #1a1a2e;
        }

        body.light-theme .estudo-item .info .modulo {
            color: #999;
        }

        @media (max-width: 768px) {
            .trilha-header-detalhe .titulo {
                font-size: 24px;
            }

            .aba {
                font-size: 13px;
                padding: 8px 14px;
            }

            .estudo-item {
                flex-wrap: wrap;
                gap: 10px;
            }

            .estudo-item .info {
                flex: 1;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="dashboard.html" title="Voltar ao início">⚡ NEXUS STUDY</a></h1>
            <div class="user-info">
                <span id="userName">👤 Usuário</span>
                <button onclick="toggleTheme()" class="btn-theme">
                    🌙 Tema
                </button>
                <button onclick="logout()" class="btn-logout">⏻ Sair</button>
            </div>
        </div>
    </header>

    <main>
        <button class="back-btn" onclick="voltarDashboard()">← Voltar para Trilhas</button>

        <!-- Header da Trilha -->
        <div class="trilha-header-detalhe">
            <div class="titulo" id="trilhaTitulo">🏆 Nome da Trilha</div>
            <div class="descricao" id="trilhaDescricao">Descrição da trilha</div>
            <div class="meta">
                <span>📚 <strong id="totalEstudos">0</strong> estudos</span>
                <span>✅ <strong id="concluidosEstudos">0</strong> concluídos</span>
                <span>📊 <strong id="progressoEstudos">0%</strong> completo</span>
                <span>⏱️ <strong id="duracaoEstudos">-</strong></span>
            </div>
        </div>

        <!-- Abas -->
        <div class="abas-container">
            <div class="abas" id="abasContainer">
                <!-- Abas serão geradas aqui -->
            </div>
        </div>

        <!-- Lista de Estudos -->
        <div id="listaEstudos" class="lista-estudos">
            <!-- Estudos serão carregados aqui -->
        </div>
    </main>

    <script src="js/trilha-detalhe.js"></script>
    <script src="js/calculadora.js"></script>
    <script src="js/caderno.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/dicionario-flutuante.js"></script>
    <script src="js/tarefas.js"></script>
    <script src="js/retro-fx.js"></script>
    <script src="js/widgets-hub-mobile.js"></script>
</body>
</html>
