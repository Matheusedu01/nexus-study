<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conquistas - Nexus Study</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/utils.js"></script>
    <script src="js/conquistas.js"></script>
    <style>
        /* ======================================== */
        /* CONQUISTAS - RETRO / 8-BIT              */
        /* ======================================== */
        .conquistas-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .conquistas-page .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .conquistas-page .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .conquistas-page .header .back-btn {
            padding: 10px 24px;
            background: #14141f;
            color: #fff;
            border: var(--pixel-border) solid #2a2a3d;
            border-radius: 0;
            box-shadow: 3px 3px 0 var(--pixel-ink);
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            text-decoration: none;
            display: inline-block;
        }

        .conquistas-page .header .back-btn:hover {
            background: #1c1c2b;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 var(--pixel-ink);
        }

        .conquistas-page .header .back-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 var(--pixel-ink);
        }

        .conquistas-page .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .conquistas-page .stats-summary .stat {
            text-align: center;
            padding: 20px;
            background: #101018;
            border: var(--pixel-border) solid #23233a;
            border-radius: 0;
            box-shadow: 4px 4px 0 var(--pixel-ink);
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .conquistas-page .stats-summary .stat:hover {
            transform: translate(-2px, -2px);
            border-color: #ffd700;
            box-shadow: 6px 6px 0 var(--pixel-ink);
        }

        .conquistas-page .stats-summary .stat .num {
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
        }

        .conquistas-page .stats-summary .stat .label {
            color: rgba(255, 255, 255, 0.55);
            font-family: var(--pixel-font);
            font-size: 8px;
            letter-spacing: 0.5px;
            line-height: 1.6;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .conquistas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .conquista-item {
            text-align: center;
            padding: 20px 15px;
            background: #101018;
            border: 2px solid #23233a;
            border-radius: 0;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease backwards;
        }

        .conquista-item:nth-child(1) { animation-delay: 0.02s; }
        .conquista-item:nth-child(2) { animation-delay: 0.05s; }
        .conquista-item:nth-child(3) { animation-delay: 0.08s; }
        .conquista-item:nth-child(4) { animation-delay: 0.11s; }
        .conquista-item:nth-child(5) { animation-delay: 0.14s; }
        .conquista-item:nth-child(6) { animation-delay: 0.17s; }

        .conquista-item.lock {
            opacity: 0.35;
            filter: grayscale(0.8);
        }

        .conquista-item.unlock {
            background: rgba(255, 215, 0, 0.06);
            border-color: #ffd700;
            box-shadow: 4px 4px 0 var(--pixel-ink);
        }

        .conquista-item.unlock:hover {
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0 var(--pixel-ink);
        }

        .conquista-item .conquista-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }

        .conquista-item .conquista-nome {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .conquista-item.lock .conquista-nome {
            color: rgba(255, 255, 255, 0.62);
        }

        .conquista-item .conquista-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.64);
            line-height: 1.3;
        }

        .conquista-item.unlock .conquista-desc {
            color: rgba(255, 255, 255, 0.55);
        }

        .conquista-item .conquista-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 14px;
        }

        .categoria-titulo {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #23233a;
        }

        .categoria-titulo:first-of-type {
            margin-top: 0;
        }

        /* Notificação */
        .conquista-notificacao {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #101018;
            border: var(--pixel-border) solid #ffd700;
            border-radius: 0;
            padding: 20px 25px;
            max-width: 380px;
            z-index: 9999;
            animation: slideInRight 0.4s ease;
            box-shadow: var(--pixel-shadow) var(--pixel-shadow) 0 var(--pixel-ink);
        }

        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(120%); opacity: 0; }
        }

        .conquista-notificacao .notif-icon { font-size: 40px; display: block; margin-bottom: 8px; }
        .conquista-notificacao .notif-titulo { color: #ffd700; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .conquista-notificacao .notif-nome { color: #fff; font-size: 18px; font-weight: 700; margin: 4px 0; }
        .conquista-notificacao .notif-desc { color: rgba(255,255,255,0.55); font-size: 14px; }

        @media (max-width: 768px) {
            .conquistas-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .conquistas-page .header h1 { font-size: 24px; }
            .conquista-notificacao { bottom: 20px; right: 20px; left: 20px; max-width: none; }
        }

        /* Tema Claro */
        body.light-theme .conquistas-page .header .back-btn {
            background: #fff;
            color: #1a1a2e;
            border-color: #1a1a2e;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
        }

        body.light-theme .conquistas-page .header .back-btn:hover {
            background: #f0f2f5;
        }

        body.light-theme .conquistas-page .stats-summary .stat {
            background: #fff;
            border-color: #1a1a2e;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.12);
        }

        body.light-theme .conquistas-page .stats-summary .stat .label {
            color: rgba(0, 0, 0, 0.55);
        }

        body.light-theme .conquista-item {
            background: #fff;
            border-color: #d5d8e0;
        }

        body.light-theme .conquista-item.unlock {
            background: rgba(255, 200, 0, 0.12);
            border-color: #d19a00;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.12);
        }

        body.light-theme .conquista-item .conquista-nome {
            color: #1a1a2e;
        }

        body.light-theme .conquista-item.lock .conquista-nome {
            color: rgba(0, 0, 0, 0.63);
        }

        body.light-theme .conquista-item .conquista-desc {
            color: rgba(0, 0, 0, 0.55);
        }

        body.light-theme .conquista-item.unlock .conquista-desc {
            color: rgba(0, 0, 0, 0.65);
        }

        body.light-theme .categoria-titulo {
            color: #1a1a2e;
            border-bottom-color: #d5d8e0;
        }

        body.light-theme .conquista-notificacao {
            background: #fff;
            border-color: #d19a00;
            box-shadow: var(--pixel-shadow) var(--pixel-shadow) 0 rgba(0, 0, 0, 0.15);
        }

        body.light-theme .conquista-notificacao .notif-nome {
            color: #1a1a2e;
        }

        body.light-theme .conquista-notificacao .notif-desc {
            color: rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1><a href="dashboard.html" title="Voltar ao início">⚡ NEXUS STUDY</a></h1>
            <div class="user-info">
                <span id="userName">👤 Usuário</span>
                <button onclick="toggleTheme()" class="btn-theme">🌙 Tema</button>
                <button onclick="logout()" class="btn-logout">⏻ Sair</button>
            </div>
        </div>
    </header>

    <main>
        <div class="conquistas-page">
            <div class="header">
                <h1>🏆 Minhas Conquistas</h1>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button onclick="compartilhar()" class="back-btn" style="cursor: pointer;">📤 Compartilhar Progresso</button>
                    <a href="dashboard.html" class="back-btn">← Voltar ao Dashboard</a>
                </div>
            </div>

            <div class="stats-summary">
                <div class="stat">
                    <div class="num" id="totalConquistas">0</div>
                    <div class="label">Total de Conquistas</div>
                </div>
                <div class="stat">
                    <div class="num" id="progressoConquistas">0%</div>
                    <div class="label">Progresso</div>
                </div>
                <div class="stat">
                    <div class="num" id="diasSeguidos">0</div>
                    <div class="label">Dias Seguidos 🔥</div>
                </div>
            </div>

            <div id="conquistasContainer">
                <!-- Conquistas carregadas aqui -->
            </div>
        </div>
    </main>

    <script>
        // ========================================
        // AUTENTICAÇÃO
        // ========================================
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'index.html';
        }
        document.getElementById('userName').textContent = `👤 ${user.name}`;

        // carregarTrilhasDoStorage() vem de js/utils.js
        // CONQUISTAS, calcularDadosConquistas() e calcularSequenciaConquistas()
        // vêm do módulo compartilhado js/conquistas.js

        function renderizarConquistas() {
            const container = document.getElementById('conquistasContainer');
            const trilhas = carregarTrilhasDoStorage();
            const dados = calcularDadosConquistas(user.email, trilhas);
            const desbloqueadas = JSON.parse(localStorage.getItem(`conquistas_${user.email}`)) || [];
            const total = CONQUISTAS.length;
            const desbloq = desbloqueadas.length;
            const progresso = total > 0 ? Math.round((desbloq / total) * 100) : 0;

            document.getElementById('totalConquistas').textContent = `${desbloq}/${total}`;
            document.getElementById('progressoConquistas').textContent = `${progresso}%`;
            document.getElementById('diasSeguidos').textContent = dados.sequencia;

            // Agrupar por categoria
            const categorias = {};
            CONQUISTAS.forEach(c => {
                if (!categorias[c.categoria]) categorias[c.categoria] = [];
                categorias[c.categoria].push(c);
            });

            let html = '';
            Object.keys(categorias).forEach(cat => {
                html += `<div class="categoria-titulo">${cat}</div>`;
                html += `<div class="conquistas-grid">`;
                categorias[cat].forEach(c => {
                    const desbloq = desbloqueadas.includes(c.id);
                    html += `
                        <div class="conquista-item ${desbloq ? 'unlock' : 'lock'}">
                            <span class="conquista-badge">${desbloq ? '✅' : '🔒'}</span>
                            <span class="conquista-icon">${desbloq ? c.icone : '❓'}</span>
                            <div class="conquista-nome">${desbloq ? c.nome : '???'}</div>
                            <div class="conquista-desc">${desbloq ? c.descricao : 'Bloqueada'}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // toggleTheme(), loadTheme() e logout() vêm de js/utils.js

        // ========================================
        // FUNÇÃO: Compartilhar Progresso
        // ========================================
        function compartilhar() {
            compartilharProgresso(user.email, carregarTrilhasDoStorage()).then(sucesso => {
                if (!sucesso) return;
                const novas = verificarNovasConquistas(user.email, carregarTrilhasDoStorage());
                renderizarConquistas();
                if (novas.length > 0) {
                    celebrarConquistaRetro();
                    alert(`🏆 Nova conquista desbloqueada!\n\n${novas.map(c => `${c.icone} ${c.nome}`).join('\n')}`);
                }
            });
        }

        // ========================================
        // INICIALIZAÇÃO
        // ========================================
        loadTheme();
        // Também verifica aqui (não só ao concluir um estudo) para já
        // desbloquear conquistas de progresso feito antes desta checagem existir.
        verificarNovasConquistas(user.email, carregarTrilhasDoStorage());
        renderizarConquistas();
    </script>
    <script src="js/calculadora.js"></script>
    <script src="js/caderno.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/dicionario-flutuante.js"></script>
    <script src="js/tarefas.js"></script>
    <script src="js/retro-fx.js"></script>
</body>
</html>
